<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Flood Risk Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: url('/static/360_F_211524227_Ett8aboQvVnROAFtqu3S1pW99Y3Th9vm.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #1e293b;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            padding: 1rem 0;
        }
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            z-index: 1;
        }
        .container {
            position: relative;
            z-index: 2;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.22);
            overflow: hidden;
        }
        .auth-header {
            padding: 2.5rem 2rem 1rem;
            text-align: center;
        }
        .auth-header h1 {
            color: #0f172a;
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        .auth-header p {
            color: #475569;
            font-weight: 500;
            margin: 0;
        }
        .form-label {
            color: #334155;
            font-size: 0.9rem;
            font-weight: 700;
        }
        .input-group-custom {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            z-index: 3;
        }
        .form-control-custom {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.8rem;
            background-color: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            color: #0f172a;
        }
        .form-control-custom:focus {
            background-color: #ffffff;
            border-color: #102fb9;
            box-shadow: 0 0 0 4px rgba(16, 47, 185, 0.12);
            outline: none;
        }
        .btn-auth {
            border: none;
            border-radius: 12px;
            padding: 0.9rem;
            color: #ffffff;
            font-weight: 800;
            background: linear-gradient(135deg, #102fb9 0%, #052996 100%);
        }
        .btn-outline-auth {
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            padding: 0.9rem;
            color: #334155;
            background: #ffffff;
            font-weight: 800;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5">
                <div class="auth-card">
                    <div class="auth-header">
                        <h1>Flood Risk Analytics</h1>
                        <p>Enter your username to save and view your prediction history.</p>
                    </div>
                    <div class="card-body px-4 pb-5">
                        {% if message %}
                            <div class="alert alert-{{ message_type }}" role="alert">{{ message }}</div>
                        {% endif %}
                        <form method="POST">
                            <div class="mb-4">
                                <label class="form-label">Username</label>
                                <div class="input-group-custom">
                                    <i class="fa-solid fa-user input-icon"></i>
                                    <input class="form-control-custom" name="username" autocomplete="username" placeholder="Enter your name" required>
                                </div>
                            </div>
                            <div class="d-grid gap-3">
                                <button class="btn-auth" type="submit">Continue</button>
                            </div>
                        </form>
                    </div>
                </div>
                <p class="text-center text-light small mt-4 opacity-75">Prediction history is saved locally in this project.</p>
            </div>
        </div>
    </div>
</body>
</html>
